{% extends 'default.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mt-5">Введите одноразовый код</h2>
            <p class="text-center">Код отправлен вам на email</p>
            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="form-group">
                    <input type="text" name="code" class="form-control" placeholder="6-значный код" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Подтвердить</button>
            </form>
            <p class="text-center mt-3">
                <a href="{% url 'login' %}">Вернуться ко входу</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
